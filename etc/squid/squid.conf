# Squid configuration for devcontainer egress restriction
# Listens on port 3128 and enforces the committed allowlist.

http_port 3128

# Define the allowlist of permitted destination domains
acl safe_domains dstdomain "/etc/squid/allowlist.conf"

# Allow CONNECT (HTTPS tunneling) to allowlisted domains on port 443 only
acl CONNECT method CONNECT
acl SSL_ports port 443
http_access allow CONNECT SSL_ports safe_domains

# Allow plain HTTP to allowlisted domains only
http_access allow safe_domains

# Deny everything else
http_access deny all

# Squid process settings suitable for foreground operation in a container
# Run with: squid -N -f /etc/squid/squid.conf
coredump_dir /var/spool/squid
