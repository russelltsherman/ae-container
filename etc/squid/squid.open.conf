# Squid configuration for WIDE-OPEN egress — opt-in posture for research
# projects that must reach arbitrary HTTPS sites (package indexes, dataset
# hosts, mirrors) without maintaining a per-domain allowlist.
#
# A project selects this config by editing ONE line in its local.Dockerfile:
#   COPY etc/squid/squid.open.conf /etc/squid/squid.conf
# The strict allowlist squid.conf remains the default for every other project.
#
# This widens *which domains* are reachable; it does NOT widen the rest of the
# model. Traffic is still forced through this proxy by protect-egress (only the
# proxy UID may leave the box), so egress stays observable in squid's logs,
# CONNECT is still restricted to 443, and the agent still cannot launch its own
# squid (start-squid is pinned). It is wide, not unguarded.

http_port 3128

acl CONNECT method CONNECT
acl SSL_ports port 443

# HTTPS tunnel to ANY domain, but only on 443.
http_access allow CONNECT SSL_ports
# Refuse CONNECT to any other port (no tunnelling arbitrary protocols).
http_access deny CONNECT
# Plain HTTP (non-CONNECT) to any domain.
http_access allow all
# Belt-and-suspenders terminal deny.
http_access deny all

# Squid process settings suitable for foreground operation in a container.
# Run with: squid -N -f /etc/squid/squid.conf
coredump_dir /var/spool/squid
