# Per-project squid allowlist — one domain per line (squid dstdomain ACL format).
# Leading dot means the domain and all subdomains are permitted.
#
# This file is the per-project customization point for egress: `aec template`
# seeds it once and NEVER overwrites it, so domains added here survive template
# updates. The shared, security-reviewed allowlist.conf is always refreshed by
# the template; this file is merged with it (additive — it cannot remove a
# shared entry, only add project-specific ones).
#
# Changes take effect on the next image build (`aec rebuild`), since squid reads
# the copy baked into the image, not this file at runtime.
#
# Example:
#   .internal.example.com
